<mat-toolbar color="primary" class="navbar">
  <div class="navbar__panel--toggle">
    <button mat-icon-button type="button" mat-button (click)="drawer.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
  </div>
  <div routerLink="/" class="navbar__panel-title">Study Helper 📖</div>
  <div class="navbar__panel-menu">
    <button mat-icon-button [matMenuTriggerFor]="menu">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item>
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <button mat-menu-item>
        <mat-icon>live_help</mat-icon>
        <span>Contact</span>
      </button>
      <button mat-menu-item>
        <mat-icon color="">logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
